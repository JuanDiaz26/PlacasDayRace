<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Placa Tucumán V14 (Pro Broadcast)</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700;900&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        /* --- COLORES OFICIALES --- */
        :root {
            --verde-tucuman: #257E77;
            --verde-oscuro: #1b5e59;
            --verde-claro: #2d9088;
            --naranja-tucuman: #EF5B2B;
            --naranja-oscuro: #d04515;
            --blanco: #ffffff;
            --gris-texto: #1a2a2a;
        }

        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            font-family: 'Roboto Condensed', 'Segoe UI', sans-serif;
            overflow: hidden;
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }

        body.oculto { opacity: 0 !important; }

        /* --- CONTENEDOR PRINCIPAL --- */
        #barra-contenedor {
            position: absolute;
            top: 38px;
            left: 50%;
            transform: translateX(-50%);
            width: 93%;
            max-width: 1860px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0px 10px 14px rgba(0,0,0,0.45));
        }

        /* --- LATERALES --- */
        .bloque-lateral {
            background: linear-gradient(180deg, #ffffff 0%, #f4f4f4 100%);
            height: 100%;
            display: flex;
            align-items: center;
            flex: 0 0 195px;
            width: 195px;
            z-index: 2;
        }

        /* --- 1. BLOQUE IZQUIERDO --- */
        .bloque-izq {
            padding-left: 14px;
            padding-right: 28px;
            border-radius: 6px 0 0 6px;
            border-left: 6px solid var(--naranja-tucuman);
            margin-right: -28px;
            clip-path: polygon(0 0, 100% 0, 88% 100%, 0% 100%);
            justify-content: flex-start;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.05);
        }

        .img-hipo {
            height: 50px;
            width: auto;
            margin-right: 10px;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.15));
        }

        .info-carrera-div {
            display: flex; flex-direction: column; justify-content: center; line-height: 1;
        }

        .txt-carrera {
            color: var(--verde-tucuman);
            font-family: 'Roboto', sans-serif;
            font-size: 21px;
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: -0.8px;
            line-height: 1;
        }

        .txt-distancia {
            color: #000;
            font-size: 15px;
            font-weight: 700;
            margin-top: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-shadow: 0px 0px 1px rgba(0,0,0,0.15);
            position: relative;
            padding-left: 10px;
        }

        .txt-distancia::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 100%;
            background: var(--naranja-tucuman);
            border-radius: 2px;
        }

        /* --- 2. BLOQUE CENTRAL --- */
        .bloque-centro {
            background: linear-gradient(95deg, var(--verde-claro) 0%, var(--verde-tucuman) 35%, var(--verde-oscuro) 100%);
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 50px;
            padding-right: 50px;
            z-index: 1;
            position: relative;
            overflow: hidden;
        }

        /* Efecto de brillo sutil en el bloque central */
        .bloque-centro::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
        }

        .bloque-centro::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -10%;
            width: 30%;
            height: 200%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
            transform: translateY(-50%) skewX(-25deg);
            pointer-events: none;
        }

        .grupo-datos-carrera {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; overflow: hidden;
            position: relative;
            z-index: 2;
        }

        #titulo-premio {
            color: var(--blanco);
            font-family: 'Roboto', sans-serif;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.55);
            line-height: 1;
            margin-bottom: 6px;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }

        .sub-datos {
            display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%;
        }

        #condicion-txt {
            color: #f0f0f0;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 900px;
            letter-spacing: 0.4px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }

        .pista-badge {
            background: linear-gradient(135deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.6) 100%);
            color: var(--blanco);
            font-size: 12px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 4px;
            border-left: 3px solid var(--naranja-tucuman);
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.6px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        }

        /* GRUPO RELOJ */
        .grupo-reloj {
            text-align: right;
            border-left: 1px solid rgba(255,255,255,0.25);
            padding-left: 18px;
            min-width: 78px;
            flex-shrink: 0;
            margin-left: 18px;
            position: relative;
            z-index: 2;
        }

        #reloj-hora {
            display: block;
            color: var(--blanco);
            font-family: 'Roboto', sans-serif;
            font-size: 22px;
            font-weight: 900;
            line-height: 1;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5px;
        }

        #reloj-fecha {
            display: block;
            color: #d4ecea;
            font-size: 11px;
            font-weight: 700;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        /* --- 3. BLOQUE DERECHO --- */
        .bloque-der {
            padding-left: 32px; padding-right: 16px;
            border-radius: 0 6px 6px 0;
            border-right: 6px solid var(--naranja-tucuman);
            margin-left: -28px;
            clip-path: polygon(12% 0, 100% 0, 100% 100%, 0% 100%);
            justify-content: center;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.05);
        }

        .img-caja {
            height: 44px;
            width: auto;
            max-width: 90%;
            object-fit: contain;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.15));
        }
    </style>
</head>
<body>

    <div id="barra-contenedor">
        <div class="bloque-lateral bloque-izq">
            <img src="logo-hipo.png" class="img-hipo" alt="Hipo Tucumán">
            <div class="info-carrera-div">
                <span id="num-carrera" class="txt-carrera">1ª CARRERA</span>
                <span id="distancia-carrera" class="txt-distancia">1200 METROS</span>
            </div>
        </div>

        <div class="bloque-centro">
            <div class="grupo-datos-carrera">
                <span id="titulo-premio">PREMIO APERTURA</span>
                <div class="sub-datos">
                    <span id="condicion-txt">Yeguas 4 años ganadoras de 1</span>
                    <span id="estado-pista" class="pista-badge">PISTA: NORMAL</span>
                </div>
            </div>

            <div class="grupo-reloj">
                <span id="reloj-hora">--:--</span>
                <span id="reloj-fecha">--/--/--</span>
            </div>
        </div>

        <div class="bloque-lateral bloque-der">
            <img src="logo-caja.png" class="img-caja" alt="Caja Popular">
        </div>
    </div>

    <script>
        async function leerDatosDesdePython() {
            try {
                const respuesta = await fetch('datos.json?nocache=' + new Date().getTime());
                const data = await respuesta.json();

                if (data.visible === false) {
                    document.body.classList.add('oculto');
                } else {
                    document.body.classList.remove('oculto');
                }

                document.getElementById('num-carrera').innerText = data.num_carrera;
                document.getElementById('distancia-carrera').innerText = data.distancia;
                document.getElementById('titulo-premio').innerText = data.premio;
                document.getElementById('condicion-txt').innerText = data.condicion;
                document.getElementById('estado-pista').innerText = "PISTA: " + data.estado_pista;

                const badge = document.getElementById('estado-pista');
                const pista = (data.estado_pista || "").toUpperCase();

                if (pista.includes("HÚMEDA") || pista.includes("HUMEDA")) {
                    badge.style.background = "linear-gradient(135deg, #d35400 0%, #a04000 100%)";
                } else if (pista.includes("PESADA") || pista.includes("FANGOSA") || pista.includes("BARROSA")) {
                    badge.style.background = "linear-gradient(135deg, #c0392b 0%, #922b21 100%)";
                } else {
                    badge.style.background = "linear-gradient(135deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.6) 100%)";
                }
            } catch (error) { console.log("Esperando datos..."); }
        }

        function reloj() {
            const d = new Date();
            document.getElementById('reloj-hora').innerText = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
            document.getElementById('reloj-fecha').innerText = d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear();
        }
        setInterval(reloj, 1000); reloj();
        setInterval(leerDatosDesdePython, 500);
    </script>
</body>
</html>
